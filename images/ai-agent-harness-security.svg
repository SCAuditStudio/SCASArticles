<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Performance scaffolding and verification infrastructure in AI smart contract audits</title>
  <desc id="desc">A comparison showing that model-compensation techniques may lose value as models improve, while independent verification and control infrastructure keeps its purpose.</desc>
  <rect width="1200" height="640" fill="#f8fafc"/>
  <rect x="48" y="42" width="1104" height="556" rx="20" fill="#ffffff" stroke="#d7dee8" stroke-width="2"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="600" y="98" text-anchor="middle" font-size="34" font-weight="700" fill="#111827">What survives a stronger model?</text>
    <text x="600" y="134" text-anchor="middle" font-size="18" fill="#475569">Separate features that compensate for model limits from controls that provide independent evidence.</text>

    <rect x="86" y="180" width="474" height="340" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="323" y="224" text-anchor="middle" font-size="25" font-weight="700" fill="#1e3a8a">Performance scaffolding</text>
    <text x="323" y="254" text-anchor="middle" font-size="16" fill="#334155">Helps the model produce a better answer</text>

    <g font-size="18" fill="#1f2937">
      <circle cx="124" cy="302" r="5" fill="#3b82f6"/>
      <text x="142" y="309">Prompt checklists</text>
      <circle cx="124" cy="344" r="5" fill="#3b82f6"/>
      <text x="142" y="351">Context chunking and retrieval</text>
      <circle cx="124" cy="386" r="5" fill="#3b82f6"/>
      <text x="142" y="393">Retries and model voting</text>
      <circle cx="124" cy="428" r="5" fill="#3b82f6"/>
      <text x="142" y="435">Model-specific prompt rules</text>
    </g>

    <rect x="118" y="466" width="410" height="72" rx="12" fill="#dbeafe"/>
    <text x="323" y="496" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">May lose value when it only patches</text>
    <text x="323" y="520" text-anchor="middle" font-size="16" fill="#1e40af">a temporary model weakness</text>

    <rect x="640" y="180" width="474" height="340" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="877" y="224" text-anchor="middle" font-size="25" font-weight="700" fill="#14532d">Verification and controls</text>
    <text x="877" y="254" text-anchor="middle" font-size="16" fill="#334155">Checks the answer or limits its impact</text>

    <g font-size="18" fill="#1f2937">
      <circle cx="678" cy="302" r="5" fill="#16a34a"/>
      <text x="696" y="309">Fuzz and invariant tests</text>
      <circle cx="678" cy="344" r="5" fill="#16a34a"/>
      <text x="696" y="351">Static and formal analysis</text>
      <circle cx="678" cy="386" r="5" fill="#16a34a"/>
      <text x="696" y="393">Reproducible exploit evidence</text>
      <circle cx="678" cy="428" r="5" fill="#16a34a"/>
      <text x="696" y="435">Permissions and human sign-off</text>
    </g>

    <rect x="672" y="466" width="410" height="72" rx="12" fill="#dcfce7"/>
    <text x="877" y="496" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">Keeps its purpose because security claims</text>
    <text x="877" y="520" text-anchor="middle" font-size="16" fill="#166534">still need evidence and accountability</text>

    <path d="M570 350 H630" stroke="#64748b" stroke-width="3" stroke-dasharray="7 7"/>
    <path d="M630 350 l-13 -8 v16 z" fill="#64748b"/>
    <text x="600" y="332" text-anchor="middle" font-size="14" fill="#475569">stronger</text>
    <text x="600" y="374" text-anchor="middle" font-size="14" fill="#475569">models</text>

    <text x="600" y="568" text-anchor="middle" font-size="16" fill="#475569">The same component can serve both purposes; evaluate why it exists and what evidence it produces.</text>
  </g>
</svg>
