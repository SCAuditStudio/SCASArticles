<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540" viewBox="0 0 1100 540" role="img" aria-labelledby="title desc">
  <title id="title">DeFi OpSec control map</title>
  <desc id="desc">A layered map showing privileged functions routed through governance, timelocks, multisig signing, off-chain infrastructure controls, monitoring, and incident response.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1100" height="540" fill="#f8fafc"/>
  <text x="550" y="44" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">DeFi OpSec Control Map</text>
  <text x="550" y="74" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">The goal is to reduce blast radius when a key, signer, interface, or cloud account fails.</text>

  <g filter="url(#shadow)">
    <rect x="40" y="125" width="180" height="275" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="40" y="125" width="180" height="46" rx="8" fill="#0f766e"/>
    <text x="130" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Privileged Actions</text>
    <text x="64" y="205" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Upgrades</text>
    <text x="64" y="237" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Treasury moves</text>
    <text x="64" y="269" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Oracle changes</text>
    <text x="64" y="301" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Risk parameters</text>
    <text x="64" y="333" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Pause and unpause</text>
    <text x="64" y="365" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Bridge verifier config</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="265" y="125" width="180" height="275" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="265" y="125" width="180" height="46" rx="8" fill="#1d4ed8"/>
    <text x="355" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Control Routing</text>
    <text x="289" y="205" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Role separation</text>
    <text x="289" y="237" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Governance vote</text>
    <text x="289" y="269" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Timelock queue</text>
    <text x="289" y="301" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Cancel guardian</text>
    <text x="289" y="333" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Emergency pause</text>
    <text x="289" y="365" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Public documentation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="490" y="125" width="180" height="275" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="490" y="125" width="180" height="46" rx="8" fill="#7c3aed"/>
    <text x="580" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Signing Layer</text>
    <text x="514" y="205" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Independent signers</text>
    <text x="514" y="237" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Hardware wallets</text>
    <text x="514" y="269" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Separate devices</text>
    <text x="514" y="301" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Decoded calldata</text>
    <text x="514" y="333" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Exact simulation</text>
    <text x="514" y="365" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Signer rotation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="715" y="125" width="180" height="275" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="715" y="125" width="180" height="46" rx="8" fill="#b45309"/>
    <text x="805" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Off-Chain Layer</text>
    <text x="739" y="205" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Cloud IAM</text>
    <text x="739" y="237" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Repos and CI/CD</text>
    <text x="739" y="269" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Frontend deploys</text>
    <text x="739" y="301" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">DNS and CDN</text>
    <text x="739" y="333" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">RPC endpoints</text>
    <text x="739" y="365" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Phishing-resistant MFA</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="125" width="120" height="275" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="940" y="125" width="120" height="46" rx="8" fill="#be123c"/>
    <text x="1000" y="155" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Response</text>
    <text x="962" y="205" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Alerts</text>
    <text x="962" y="237" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Cancel</text>
    <text x="962" y="269" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Pause</text>
    <text x="962" y="301" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Rotate</text>
    <text x="962" y="333" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Communicate</text>
    <text x="962" y="365" font-family="Inter, Arial, sans-serif" font-size="14" fill="#0f172a">Recover</text>
  </g>

  <line x1="220" y1="263" x2="265" y2="263" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="445" y1="263" x2="490" y2="263" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="263" x2="715" y2="263" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="895" y1="263" x2="940" y2="263" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="187" y="437" width="726" height="48" rx="8" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="550" y="467" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#155e75">Design goal: one compromised key, app, signer, or cloud session should not equal full protocol control.</text>
</svg>
